<title>Redirecting to MGN</title>
<style>
    /* From Uiverse.io by codebykay101 */ 
    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    
    .container .square {
      position: absolute;
      width: 200px;
      height: 200px;
    }
    
    .container .square:nth-child(2) {
      transform: translate(-25%, -25%) rotateX(180deg);
      filter: hue-rotate(60deg);
    }
    
    .container .square:nth-child(3) {
      transform: translate(25%, 25%) rotate(180deg);
      filter: hue-rotate(180deg);
    }
    
    .container .square::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #0f0;
      box-shadow: 0 0 0 8px #0f03, 0 0 0 15px #0f01;
      animation: animateSquare 4s linear infinite;
    }
    
    @keyframes animateSquare {
      0% {
        transform: translate(2px,2px);
      }
    
      25% {
        transform: translate(178px,2px);
      }
    
      50% {
        transform: translate(178px,178px);
      }
    
      75% {
        transform: translate(2px,178px);
      }
    
      100% {
        transform: translate(2px,2px);
      }
    }
    
    .container .square span {
      position: absolute;
      inset: 10px;
      overflow: hidden;
      transform: rotate(calc(90deg * var(--i)));
    }
    
    .container .square span::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 4px;
      background: #0f0;
      transform: translateX(-100%);
      animation: animate 4s linear infinite;
      animation-delay: calc(1s * var(--i));
    }
    
    @keyframes animate {
      0% {
        transform: translateX(-100%);
      }
    
      50%,100% {
        transform: translateX(100%);
      }
    }
    
    .loading-text {
      margin-top: 240px; /* Adjust to place the text below the animation */
      font-size: 1.5rem;
      color: #FF5F1F;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    </style>
    
    <div class="container">
      <div class="square">
        <span style="--i:0;"></span>
        <span style="--i:1;"></span>
        <span style="--i:2;"></span>
        <span style="--i:3;"></span>
      </div>
      <div class="square">
        <span style="--i:0;"></span>
        <span style="--i:1;"></span>
        <span style="--i:2;"></span>
        <span style="--i:3;"></span>
      </div>
      <div class="square">
        <span style="--i:0;"></span>
        <span style="--i:1;"></span>
        <span style="--i:2;"></span>
        <span style="--i:3;"></span>
      </div>
      <div class="loading-text">Loading Resources</div>
    </div>
    
    <script>
      // Redirect to home.html after a random time between 3-5 seconds
      const delay = Math.floor(Math.random() * (5000 - 3000 + 1)) + 3000;
      setTimeout(() => {
        window.location.href = 'home.html';
      }, delay);
    </script>
